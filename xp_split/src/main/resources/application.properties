spring.application.name=xp_split
# ============================================
# XP_SPLIT - Application Configuration
# Aiven Cloud MySQL Integration
# ============================================

# --- Aiven MySQL Connection ---
# Replace the values below with your actual Aiven credentials
# Found in: Aiven Console > Your Service > Connection Information

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Example (replace with your actual Aiven values):
# spring.datasource.url=jdbc:mysql://mysql-xpsplit-yourproject.aivencloud.com:12345/defaultdb?ssl-mode=REQUIRED&useSSL=true&requireSSL=true&serverTimezone=UTC
# spring.datasource.username=avnadmin
# spring.datasource.password=AVNS_xxxxxxxxxxxxxxxx

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8888


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.schema=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG